  <text x="50%" y="94%" text-anchor="middle" font-family="Arial, sans-serif" font-size="30.599999999999998" fill="#ffffff" opacity="0.55" letter-spacing="3">HERRERA LANDSCAPE • PLACEHOLDER</text>
